name: Sync to Hugging Face Space
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Hugging Face CLI
        run: pip install -U "huggingface_hub[cli]"
        
      - name: Upload to Hugging Face menggunakan hf (Perintah Baru)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload Frizt27/dsscompost . . --repo-type space --exclude=".git/*" --exclude=".github/*"
