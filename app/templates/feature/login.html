  <div id="auth-page" style="display:none" class="hidden">
    
    <div class="auth-card">
      <div class="auth-logo">🌿Smart DSS Compost</div>
      <div class="auth-tagline">Decision Support System Pengolahan Kompos Berbasis IoT & ML</div>

      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchAuthTab('login')">Masuk</div>
        <div class="auth-tab" onclick="switchAuthTab('register')">Daftar</div>
      </div>

      <div id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="login-email" type="email" class="form-input" placeholder="nama@email.com"/>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input id="login-password" type="password" class="form-input" placeholder="••••••••"/>
        </div>
        <div id="login-error" class="alert alert-error hidden"></div>
        <button class="btn btn-primary w-full btn-lg" onclick="handleLogin()" id="login-btn">
          Masuk ke Dashboard
        </button>
        <div style="display:flex;justify-content:flex-start;margin-bottom:12px;">
          <button class="btn btn-ghost btn-sm" onclick="backToBlog()">
            ← Back
          </button>
        </div>
      </div>

      <div id="register-form" class="hidden">
        <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input id="reg-name" type="text" class="form-input" placeholder="Nama Anda"/>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input id="reg-email" type="email" class="form-input" placeholder="nama@email.com"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Password</label>
            <input id="reg-password" type="password" class="form-input" placeholder="Min. 6 karakter"/>
          </div>
          <div class="form-group">
            <label class="form-label">Konfirmasi</label>
            <input id="reg-confirm" type="password" class="form-input" placeholder="Ulangi password"/>
          </div>
        </div>
        <div id="reg-error" class="alert alert-error hidden"></div>
        <button class="btn btn-primary w-full btn-lg" onclick="handleRegister()" id="reg-btn">
          Buat Akun
        </button>
      </div>
    </div>
  </div>
